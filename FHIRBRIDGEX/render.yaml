services:
  # 1. FastAPI Backend
  - type: web
    name: fhirbridge-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: POSTGRES_URL
        fromDatabase:
          name: fhirbridge-db
          property: connectionString
      - key: RABBITMQ_URL
        fromService:
          type: pserv
          name: rabbitmq-broker
          envVarKey: RABBITMQ_INTERNAL_URL
          
  # 2. Celery / Pika Background Worker
  - type: worker
    name: fhirbridge-worker
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd worker && python main.py"
    envVars:
      - key: POSTGRES_URL
        fromDatabase:
          name: fhirbridge-db
          property: connectionString
      - key: RABBITMQ_URL
        fromService:
          type: pserv
          name: rabbitmq-broker
          envVarKey: RABBITMQ_INTERNAL_URL

  # 3. RabbitMQ Message Broker (Private Service)
  - type: pserv
    name: rabbitmq-broker
    env: docker
    repo: https://github.com/docker-library/rabbitmq.git # Use standard rabbitmq
    branch: master
    dockerfilePath: "3.13/alpine/Dockerfile"
    envVars:
      - key: RABBITMQ_INTERNAL_URL
        value: "amqp://guest:guest@rabbitmq-broker:5672/"

databases:
  # 4. PostgreSQL Database
  - name: fhirbridge-db
    databaseName: fhirbridge
    user: fhirbridge
    plan: free
