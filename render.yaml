services:
  # 1. FastAPI Backend (All-in-one free tier)
  - type: web
    name: fhirbridge-backend
    env: python
    rootDir: FHIRBRIDGEX
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: POSTGRES_URL
        fromDatabase:
          name: fhirbridge-db
          property: connectionString

databases:
  # 2. PostgreSQL Database (Free tier)
  - name: fhirbridge-db
    databaseName: fhirbridge
    user: fhirbridge
    plan: free

  # 3. HMS Frontend/Backend (Flask App)
  - type: web
    name: hms-system
    env: python
    rootDir: hms
    buildCommand: "pip install flask gunicorn"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
