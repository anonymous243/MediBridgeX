{% extends "base.html" %}
{% block page_title %}{{ 'Edit appointment' if appointment else 'Schedule appointment' }}{% endblock %}

{% block content %}

<div style="margin-bottom:14px">
  <a href="{{ url_for('appointments') }}" class="btn btn-outline btn-sm">← Back to appointments</a>
</div>

<div class="form-card">
  <h2 style="font-size:16px;font-weight:600;margin-bottom:20px">
    {{ 'Edit appointment' if appointment else 'Schedule new appointment' }}
  </h2>

  <form method="post">
    <div class="form-grid">

      <div class="form-group full">
        <label>Patient *</label>
        <select name="patient_id" required>
          <option value="">— Select patient —</option>
          {% for p in patients %}
            <option value="{{ p.id }}"
              {{ 'selected' if appointment and appointment.patient_id==p.id }}>
              {{ p.name }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Doctor *</label>
        <input name="doctor" required
          value="{{ appointment.doctor if appointment else '' }}"
          placeholder="e.g. Dr. Venkat">
      </div>

      <div class="form-group">
        <label>Department *</label>
        <select name="department">
          {% for d in ['Cardiology','Orthopaedics','Neurology','Paediatrics','Oncology','General Medicine','Dermatology','ENT','Gynaecology','Urology'] %}
            <option value="{{ d }}" {{ 'selected' if appointment and appointment.department==d }}>{{ d }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Date *</label>
        <input type="date" name="appt_date" required
          value="{{ appointment.appt_date if appointment else '' }}">
      </div>

      <div class="form-group">
        <label>Time *</label>
        <input type="time" name="appt_time" required
          value="{{ appointment.appt_time if appointment else '' }}">
      </div>

      <div class="form-group">
        <label>Appointment type</label>
        <select name="type">
          {% for t in ['Consultation','Follow-up','Emergency','Check-up','Procedure','Review','Chemo session','Post-op review'] %}
            <option value="{{ t }}" {{ 'selected' if appointment and appointment.type==t }}>{{ t }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Status</label>
        <select name="status">
          {% for s in ['Scheduled','Confirmed','Pending','Urgent','Completed','Cancelled'] %}
            <option value="{{ s }}" {{ 'selected' if appointment and appointment.status==s }}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group full">
        <label>Notes</label>
        <textarea name="notes" placeholder="Any additional notes…">{{ appointment.notes if appointment else '' }}</textarea>
      </div>

    </div>

    <div class="form-actions">
      <button class="btn btn-primary" type="submit">
        {{ 'Save changes' if appointment else 'Schedule' }}
      </button>
      <a href="{{ url_for('appointments') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
