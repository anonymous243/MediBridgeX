{% extends "base.html" %}
{% block page_title %}{{ 'Edit patient' if patient else 'New patient' }}{% endblock %}

{% block content %}

<div style="margin-bottom:14px">
  <a href="{{ url_for('patients') }}" class="btn btn-outline btn-sm">← Back to patients</a>
</div>

<div class="form-card">
  <h2 style="font-size:16px;font-weight:600;margin-bottom:20px">
    {{ 'Edit patient record' if patient else 'Register new patient' }}
  </h2>

  <form method="post">
    <div class="form-grid">

      <div class="form-group full">
        <label>Full name *</label>
        <input name="name" required value="{{ patient.name if patient else '' }}" placeholder="e.g. Priya Sharma">
      </div>

      <div class="form-group">
        <label>Age *</label>
        <input name="age" type="number" min="0" max="150" required value="{{ patient.age if patient else '' }}">
      </div>

      <div class="form-group">
        <label>Gender *</label>
        <select name="gender" required>
          {% for g in ['Male','Female','Other'] %}
            <option value="{{ g }}" {{ 'selected' if patient and patient.gender==g }}>{{ g }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input name="phone" value="{{ patient.phone if patient else '' }}" placeholder="10-digit mobile">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input name="email" type="email" value="{{ patient.email if patient else '' }}">
      </div>

      <div class="form-group">
        <label>Department</label>
        <select name="department">
          {% for d in ['Cardiology','Orthopaedics','Neurology','Paediatrics','Oncology','General Medicine','Dermatology','ENT','Gynaecology','Urology'] %}
            <option value="{{ d }}" {{ 'selected' if patient and patient.department==d }}>{{ d }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Blood group</label>
        <select name="blood_group">
          {% for bg in ['A+','A-','B+','B-','O+','O-','AB+','AB-','Unknown'] %}
            <option value="{{ bg }}" {{ 'selected' if patient and patient.blood_group==bg }}>{{ bg }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Status</label>
        <select name="status">
          {% for s in ['Active','Admitted','Follow-up','Discharged'] %}
            <option value="{{ s }}" {{ 'selected' if patient and patient.status==s }}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group full">
        <label>Address</label>
        <textarea name="address">{{ patient.address if patient else '' }}</textarea>
      </div>

    </div>

    <div class="form-actions">
      <button class="btn btn-primary" type="submit">
        {{ 'Save changes' if patient else 'Register patient' }}
      </button>
      <a href="{{ url_for('patients') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
